<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flying Frogs - Login</title>
  <link rel="stylesheet" href="/styleslogin.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <h1>🐸 Flying Frogs</h1>
      <p class="subtitle">Gym Management Portal</p>

      <div class="alert alert-error" id="error-alert" style="display:none"></div>

      <!-- LOGIN FORM -->
      <form id="login-form">
        <div class="tabs">
          <button type="button" class="tab-btn active" data-role="member">Member</button>
          <button type="button" class="tab-btn" data-role="instructor">Staff</button>
        </div>
        <input type="hidden" id="login-role" value="member">

        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label for="login-name">Password</label>
          <input type="text" id="login-name" required placeholder="Password">
        </div>
        <button type="submit" class="btn btn-primary form-submit">Log In</button>
        <p class="form-footer">Don't have an account? <a id="switch-to-signup">Sign up</a></p>
      </form>

      <!-- SIGNUP FORM -->
      <form id="signup-form" style="display:none">
        <div class="tabs">
          <button type="button" class="tab-btn active" data-role="member">Member</button>
          <button type="button" class="tab-btn" data-role="instructor">Staff</button>
        </div>
        <input type="hidden" id="signup-role" value="member">

        <div class="form-row">
          <div class="form-group">
            <label for="signup-first">First Name</label>
            <input type="text" id="signup-first" required>
          </div>
          <div class="form-group">
            <label for="signup-last">Last Name</label>
            <input type="text" id="signup-last" required>
          </div>
        </div>
        <div class="form-group">
          <label for="signup-email">Email</label>
          <input type="email" id="signup-email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label for="signup-phone">Phone</label>
          <input type="tel" id="signup-phone" required placeholder="5551234567">
        </div>
        <div class="form-group" id="dob-group">
          <label for="signup-dob">Date of Birth</label>
          <input type="date" id="signup-dob" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="signup-password">Password</label>
            <input type="password" id="signup-password" required minlength="6">
          </div>
          <div class="form-group">
            <label for="signup-confirm">Confirm Password</label>
            <input type="password" id="signup-confirm" required minlength="6">
          </div>
        </div>
        <button type="submit" class="btn btn-primary form-submit">Create Account</button>
        <p class="form-footer">Already have an account? <a id="switch-to-login">Log in</a></p>
      </form>
    </div>
  </div>
  <script>
    const loginForm = document.getElementById('login-form');
    const signupForm = document.getElementById('signup-form');
    const errorAlert = document.getElementById('error-alert');

    // Toggle between login and signup forms
    document.getElementById('switch-to-signup').addEventListener('click', () => {
      loginForm.style.display = 'none';
      signupForm.style.display = 'block';
      errorAlert.style.display = 'none';
    });

    document.getElementById('switch-to-login').addEventListener('click', () => {
      loginForm.style.display = 'block';
      signupForm.style.display = 'none';
      errorAlert.style.display = 'none';
    });

    // Handle role switching on both forms
    document.querySelectorAll('.tabs .tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        // Update active state
        const parent = btn.parentElement;
        parent.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        // Update hidden role input
        const form = btn.closest('form');
        const roleInput = form.querySelector('input[type="hidden"]');
        roleInput.value = btn.dataset.role;

        // Show/hide DOB field for signup (staff don't need DOB)
        if (form.id === 'signup-form') {
          const dobGroup = document.getElementById('dob-group');
          dobGroup.style.display = btn.dataset.role === 'instructor' ? 'none' : 'block';
        }
      });
    });

    // Handle login form submission
    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      
      const role = document.getElementById('login-role').value;
      const email = document.getElementById('login-email').value.trim();
      const name = document.getElementById('login-name').value.trim();

      // Basic validation
      if (!email || !name) {
        showError('Please fill in all fields');
        return;
      }

      // Store user info in sessionStorage (optional, for displaying on dashboard)
      sessionStorage.setItem('userName', name);
      sessionStorage.setItem('userEmail', email);
      sessionStorage.setItem('userRole', role);

      // Redirect based on role
      if (role === 'member') {
        window.location.href = '/member.html';
      } else {
        window.location.href = '/staff.html';
      }
    });

    // Handle signup form submission
    signupForm.addEventListener('submit', (e) => {
      e.preventDefault();
      
      const role = document.getElementById('signup-role').value;
      const firstName = document.getElementById('signup-first').value.trim();
      const lastName = document.getElementById('signup-last').value.trim();
      const email = document.getElementById('signup-email').value.trim();
      const phone = document.getElementById('signup-phone').value.trim();
      
      // Basic validation
      if (!firstName || !lastName || !email || !phone) {
        showError('Please fill in all required fields');
        return;
      }

      if (role === 'member') {
        const dob = document.getElementById('signup-dob').value;
        if (!dob) {
          showError('Please enter your date of birth');
          return;
        }
      }

      // Store user info
      sessionStorage.setItem('userName', `${firstName} ${lastName}`);
      sessionStorage.setItem('userEmail', email);
      sessionStorage.setItem('userRole', role);

      // Redirect based on role
      if (role === 'member') {
        window.location.href = '/member.html';
      } else {
        window.location.href = '/staff.html';
      }
    });

    function showError(message) {
      errorAlert.textContent = message;
      errorAlert.style.display = 'block';
      setTimeout(() => {
        errorAlert.style.display = 'none';
      }, 3000);
    }
  </script>
</body>
</html>
